<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triagem.IA — Central de Tickets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== Design tokens ========== */
:root {
  --font-display: 'Fraunces', 'Times New Roman', serif;
  --font-body: 'Inter Tight', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;

  --bg-0: #0b0c0e;
  --bg-1: #111316;
  --bg-2: #1a1d21;
  --bg-3: #24282d;
  --border: #2a2f35;
  --border-strong: #3a4049;

  --text-1: #f4f1ea;
  --text-2: #b8b3a8;
  --text-3: #7a7770;
  --text-muted: #55534e;

  --accent: #d9ff3f;
  --accent-dim: #a3c02b;

  --prio-alta: #ff4e3f;
  --prio-alta-bg: rgba(255, 78, 63, 0.12);
  --prio-alta-border: rgba(255, 78, 63, 0.35);

  --prio-media: #ffb13b;
  --prio-media-bg: rgba(255, 177, 59, 0.12);
  --prio-media-border: rgba(255, 177, 59, 0.35);

  --prio-baixa: #3fd67e;
  --prio-baixa-bg: rgba(63, 214, 126, 0.12);
  --prio-baixa-border: rgba(63, 214, 126, 0.35);

  --status-aberto: #5fb7ff;
  --status-andamento: #c77dff;
  --status-resolvido: #3fd67e;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 14px;
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body {
  background-image:
    radial-gradient(ellipse at top left, rgba(217, 255, 63, 0.04), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(95, 183, 255, 0.03), transparent 50%);
  background-attachment: fixed;
}

button { font-family: inherit; font-size: inherit; border: 0; background: none; color: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; background: none; border: 0; outline: none; }
a { color: inherit; text-decoration: none; }

::selection { background: var(--accent); color: var(--bg-0); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-0); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
@keyframes spin { to { transform: rotate(360deg); } }

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
.mono { font-family: var(--font-mono); }

/* ========== Header ========== */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(11, 12, 14, 0.82);
  backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--border);
}

.app-header__inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 32px; padding: 18px 32px;
  max-width: 1280px; margin: 0 auto;
}

.brand {
  display: inline-flex; align-items: baseline; gap: 10px;
  font-family: var(--font-display); font-size: 22px; font-weight: 600;
  letter-spacing: -0.02em;
}

.brand__mark { color: var(--accent); font-size: 14px; transform: translateY(-2px); }
.brand__name em { font-style: italic; color: var(--text-3); font-weight: 400; }

.nav {
  display: flex; gap: 4px; background: var(--bg-2);
  padding: 4px; border-radius: 999px; border: 1px solid var(--border);
}

.nav__link {
  padding: 8px 18px; font-size: 13px; font-weight: 500;
  color: var(--text-2); border-radius: 999px;
  transition: color 0.2s var(--ease), background 0.2s var(--ease);
  letter-spacing: 0.01em;
}

.nav__link:hover { color: var(--text-1); }
.nav__link.is-active { background: var(--accent); color: var(--bg-0); }

.header-meta {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.08em;
}

.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--prio-baixa); box-shadow: 0 0 10px var(--prio-baixa);
  animation: pulse 1.8s infinite;
}

@media (max-width: 640px) {
  .header-meta { display: none; }
  .app-header__inner { gap: 12px; padding: 14px 20px; }
}

/* ========== Main ========== */
main { padding: 48px 0 96px; }
.view { animation: fadeIn 0.4s var(--ease); }
.hidden { display: none !important; }

/* ========== Page header ========== */
.page-header {
  margin-bottom: 40px; display: flex; align-items: flex-end;
  justify-content: space-between; gap: 24px; flex-wrap: wrap;
}

.page-title {
  font-family: var(--font-display); font-weight: 500;
  font-size: clamp(40px, 6vw, 68px); line-height: 0.95;
  letter-spacing: -0.035em; font-variation-settings: "opsz" 144;
}

.page-title em { font-style: italic; color: var(--text-3); font-weight: 400; }

.page-subtitle { margin-top: 8px; color: var(--text-2); font-size: 15px; max-width: 60ch; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--accent-dim); margin-bottom: 16px;
}
.eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--accent-dim); }

/* ========== Buttons ========== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 22px; font-weight: 500; font-size: 14px;
  border-radius: 999px;
  transition: transform 0.15s var(--ease), background 0.2s var(--ease),
              color 0.2s var(--ease), border-color 0.2s var(--ease),
              box-shadow 0.2s var(--ease);
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; }

.btn--primary { background: var(--accent); color: var(--bg-0); font-weight: 600; }
.btn--primary:hover:not([disabled]) { background: #e6ff5c; box-shadow: 0 8px 30px -8px var(--accent); }

.btn--ghost { background: transparent; color: var(--text-1); border: 1px solid var(--border-strong); }
.btn--ghost:hover:not([disabled]) { border-color: var(--text-1); background: var(--bg-2); }

.btn--ai {
  background: var(--bg-2); color: var(--text-1);
  border: 1px solid var(--border-strong);
  position: relative; overflow: hidden;
}
.btn--ai::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(217, 255, 63, 0.15) 50%, transparent 70%);
  transform: translateX(-100%); transition: transform 0.6s var(--ease);
}
.btn--ai:hover:not([disabled])::before { transform: translateX(100%); }
.btn--ai:hover:not([disabled]) { border-color: var(--accent); color: var(--accent); }

.btn--sm { padding: 8px 14px; font-size: 13px; }

/* ========== Badges ========== */
.prio-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 4px 10px 4px 8px; border-radius: 999px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  border: 1px solid; white-space: nowrap;
}
.prio-badge__dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor; box-shadow: 0 0 8px currentColor;
}
.prio-badge--alta  { color: var(--prio-alta);  background: var(--prio-alta-bg);  border-color: var(--prio-alta-border); }
.prio-badge--media { color: var(--prio-media); background: var(--prio-media-bg); border-color: var(--prio-media-border); }
.prio-badge--baixa { color: var(--prio-baixa); background: var(--prio-baixa-bg); border-color: var(--prio-baixa-border); }
.prio-badge--lg { padding: 6px 14px 6px 12px; font-size: 12px; }

.status-pill {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
  border: 1px solid var(--border); background: var(--bg-2); color: var(--text-2);
}
.status-pill--aberto       { color: var(--status-aberto);     border-color: rgba(95, 183, 255, 0.3); }
.status-pill--em_andamento { color: var(--status-andamento);  border-color: rgba(199, 125, 255, 0.3); }
.status-pill--resolvido    { color: var(--status-resolvido);  border-color: rgba(63, 214, 126, 0.3); }

/* ========== Stats ========== */
.stats-bar {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--border); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 32px;
}
.stat { background: var(--bg-1); padding: 22px 24px; display: flex; flex-direction: column; gap: 6px; }
.stat__label {
  font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3);
}
.stat__value {
  font-family: var(--font-display); font-size: 42px; font-weight: 500;
  letter-spacing: -0.03em; line-height: 1;
}
@media (max-width: 640px) {
  .stats-bar { grid-template-columns: 1fr; }
  .stat__value { font-size: 32px; }
}

/* ========== Toolbar ========== */
.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 20px; margin-bottom: 28px; flex-wrap: wrap;
}
.filters {
  display: flex; gap: 6px; background: var(--bg-1); padding: 4px;
  border-radius: 999px; border: 1px solid var(--border);
}
.chip {
  padding: 7px 16px; font-size: 12.5px; font-weight: 500;
  color: var(--text-2); border-radius: 999px;
  transition: background 0.2s var(--ease), color 0.2s var(--ease);
}
.chip:hover { color: var(--text-1); }
.chip.is-active { background: var(--text-1); color: var(--bg-0); }

.search { position: relative; flex: 1; max-width: 380px; min-width: 220px; }
.search__icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); font-size: 16px;
}
.search input {
  width: 100%; padding: 10px 16px 10px 38px;
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: 999px; font-size: 13.5px;
  transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
}
.search input:focus { border-color: var(--border-strong); background: var(--bg-2); }

/* ========== Cards ========== */
.tickets-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.ticket-card {
  position: relative; display: flex; flex-direction: column; gap: 16px;
  padding: 22px 22px 18px; background: var(--bg-1);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  transition: transform 0.25s var(--ease), border-color 0.25s var(--ease), background 0.25s var(--ease);
  opacity: 0; animation: fadeUp 0.5s var(--ease) forwards;
  overflow: hidden; cursor: pointer;
}
.ticket-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--accent);
  transform: scaleY(0); transform-origin: top;
  transition: transform 0.3s var(--ease);
}
.ticket-card:hover { border-color: var(--border-strong); background: var(--bg-2); transform: translateY(-2px); }
.ticket-card:hover::before { transform: scaleY(1); }

.ticket-card__top { display: flex; justify-content: space-between; align-items: center; }
.ticket-card__id { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }
.ticket-card__title {
  font-family: var(--font-display); font-weight: 500;
  font-size: 22px; line-height: 1.2; letter-spacing: -0.02em;
}
.ticket-card__excerpt {
  font-size: 13.5px; color: var(--text-2); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ticket-card__meta {
  display: flex; flex-direction: column; gap: 6px; padding: 12px 0;
  border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border);
  margin-top: auto;
}
.meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
.meta-label {
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em;
  font-family: var(--font-mono); font-size: 10.5px;
}
.meta-value { color: var(--text-1); font-size: 12px; }
.ticket-card__bottom { display: flex; justify-content: space-between; align-items: center; }
.ticket-card__arrow {
  font-size: 18px; color: var(--text-3);
  transition: transform 0.25s var(--ease), color 0.25s var(--ease);
}
.ticket-card:hover .ticket-card__arrow { color: var(--accent); transform: translateX(4px); }

/* ========== Skeleton ========== */
.skeleton {
  background: linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%);
  background-size: 800px 100%;
  animation: shimmer 1.6s infinite linear;
  border-radius: var(--radius-sm);
}
.skeleton-card {
  padding: 22px; background: var(--bg-1);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
}

/* ========== Empty / Alert ========== */
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-2); }
.empty-state h3 {
  font-family: var(--font-display); font-weight: 500; font-size: 28px;
  color: var(--text-1); margin-bottom: 8px; letter-spacing: -0.02em;
}
.alert {
  padding: 14px 18px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--bg-2);
  font-size: 14px; display: flex; align-items: center; gap: 12px;
}
.alert--error {
  border-color: var(--prio-alta-border);
  background: var(--prio-alta-bg); color: #ffb4ac;
}

/* ========== Form ========== */
.ticket-form { display: flex; flex-direction: column; gap: 28px; max-width: 720px; }
.field { display: flex; flex-direction: column; gap: 10px; }
.field > label { display: flex; flex-direction: column; gap: 3px; }
.field__label {
  font-family: var(--font-display); font-weight: 500;
  font-size: 18px; letter-spacing: -0.01em;
}
.field__hint { font-size: 12.5px; color: var(--text-3); }

.field input, .field textarea, .field select {
  width: 100%; padding: 14px 16px;
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--radius-md); color: var(--text-1); font-size: 15px;
  transition: border-color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.field textarea { resize: vertical; min-height: 120px; line-height: 1.55; }
.field input::placeholder, .field textarea::placeholder { color: var(--text-muted); }
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent); background: var(--bg-2);
  box-shadow: 0 0 0 3px rgba(217, 255, 63, 0.12);
}
.field--error input, .field--error textarea { border-color: var(--prio-alta); }
.field__footer { display: flex; justify-content: flex-end; }
.field__count { font-size: 11px; color: var(--text-muted); }
.field__error { color: var(--prio-alta); font-size: 12.5px; font-family: var(--font-mono); }

.select-wrap { position: relative; }
.select-wrap select { appearance: none; -webkit-appearance: none; padding-right: 42px; cursor: pointer; }
.select-wrap select option { background: var(--bg-2); color: var(--text-1); }
.select-caret {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); pointer-events: none; font-size: 14px;
}

.ticket-form__actions {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  border-top: 1px solid var(--border); margin-top: 8px; padding-top: 24px;
}
.ticket-form__hint { font-size: 12px; color: var(--text-3); max-width: 36ch; }

.spinner {
  width: 14px; height: 14px; border: 2px solid currentColor;
  border-top-color: transparent; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ========== Detail ========== */
.breadcrumb {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text-3); letter-spacing: 0.05em;
  transition: color 0.2s var(--ease); cursor: pointer;
}
.breadcrumb:hover { color: var(--text-1); }

.fresh-banner {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 16px; margin-top: 20px;
  background: rgba(63, 214, 126, 0.1);
  border: 1px solid rgba(63, 214, 126, 0.3);
  border-radius: 999px; font-family: var(--font-mono);
  font-size: 12px; color: var(--prio-baixa); letter-spacing: 0.03em;
  animation: fadeUp 0.4s var(--ease);
}
.fresh-banner__dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--prio-baixa); box-shadow: 0 0 10px var(--prio-baixa);
}

.detail-header {
  padding: 32px 0 28px;
  border-bottom: 1px solid var(--border); margin-bottom: 40px;
}
.detail-header__top {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap; margin-bottom: 18px;
}
.ticket-id-big { font-size: 12px; color: var(--text-3); letter-spacing: 0.08em; }
.detail-title {
  font-family: var(--font-display); font-weight: 500;
  font-size: clamp(32px, 5vw, 54px); line-height: 1.05;
  letter-spacing: -0.03em; max-width: 24ch;
}
.detail-meta {
  display: flex; gap: 40px; margin-top: 24px;
  flex-wrap: wrap; font-size: 12.5px;
}
.detail-meta > div { display: flex; flex-direction: column; gap: 4px; }
.detail-meta span {
  color: var(--text-3); text-transform: uppercase;
  letter-spacing: 0.1em; font-size: 10.5px;
}
.detail-meta strong { color: var(--text-1); font-weight: 500; font-size: 13px; }

.detail-layout {
  display: grid; grid-template-columns: 1fr 320px;
  gap: 48px; align-items: start;
}
@media (max-width: 900px) { .detail-layout { grid-template-columns: 1fr; } }

.detail-main { display: flex; flex-direction: column; gap: 32px; }

.block { display: flex; flex-direction: column; gap: 14px; animation: fadeUp 0.4s var(--ease) both; }
.block__label {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-3);
}
.ai-tag {
  display: inline-flex; align-items: center;
  padding: 2px 7px; background: var(--accent); color: var(--bg-0);
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  border-radius: 3px;
}
.block__body {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px 26px;
}
.block--highlight .block__body {
  background: linear-gradient(180deg, rgba(217, 255, 63, 0.04), transparent 60%), var(--bg-1);
  border-color: rgba(217, 255, 63, 0.2);
  position: relative; overflow: hidden;
}
.block--highlight .block__body::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.prose { font-size: 15px; line-height: 1.65; white-space: pre-wrap; }
.reply {
  font-family: var(--font-display); font-style: italic;
  font-size: 18px; line-height: 1.5;
  padding: 8px 0 8px 20px; border-left: 2px solid var(--accent);
}

.detail-aside { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 96px; }

.ai-card {
  background:
    radial-gradient(ellipse at top right, rgba(217, 255, 63, 0.08), transparent 60%),
    var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 22px;
}
.ai-card__header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.ai-card__header h3 { font-family: var(--font-display); font-weight: 500; font-size: 17px; letter-spacing: -0.01em; }
.ai-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px;
  background: rgba(217, 255, 63, 0.1);
  border: 1px solid rgba(217, 255, 63, 0.3);
  border-radius: 999px; font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  color: var(--accent); letter-spacing: 0.1em;
}
.ai-badge__dot {
  width: 5px; height: 5px; background: var(--accent);
  border-radius: 50%; box-shadow: 0 0 8px var(--accent);
  animation: pulse 1.8s infinite;
}
.ai-card__text { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 16px; }
.ai-card .btn { width: 100%; }

.info-card {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 22px;

<body>

<!-- ===================== HEADER ===================== -->
<header class="app-header">
  <div class="app-header__inner">
    <a href="#/" class="brand" data-route="/">
      <span class="brand__mark">◆</span>
      <span class="brand__name">Triagem<em>.IA</em></span>
    </a>

    <nav class="nav">
      <a href="#/" class="nav__link" data-route="/">Tickets</a>
      <a href="#/novo" class="nav__link" data-route="/novo">Novo</a>
    </nav>

    <div class="header-meta">
      <span class="pulse-dot"></span> API conectada
    </div>
  </div>
</header>

<!-- ===================== MAIN ===================== -->
<main class="container">
  <div id="app"></div>
</main>

<!-- ===================== FOOTER ===================== -->
<footer class="app-footer">
  <div class="app-footer__inner">
    <span>Triagem.IA — v0.1</span>
    <span class="mono">Laravel · HTML · LLM</span>
  </div>
</footer>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const API_BASE = 'http://127.0.0.1:8000/api'

/* ============================================================
   API SERVICE
   ============================================================ */
async function request(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    ...options,
  })
  if (!res.ok) {
    const body = await res.json().catch(() => ({}))
    const err = new Error(body.message || body.error || `HTTP ${res.status}`)
    err.status = res.status
    err.body = body
    throw err
  }
  const data = await res.json().catch(() => ({}))
  return data
}

const api = {
  list: async () => {
    const data = await request('/tickets')
    return Array.isArray(data) ? data : (data.data ?? [])
  },
  get: async (id) => {
    const data = await request(`/tickets/${id}`)
    return data.data ?? data
  },
  create: async (payload) => {
    const data = await request('/tickets', { method: 'POST', body: JSON.stringify(payload) })
    return data.data ?? data
  },
  triage: async (id) => {
    const data = await request(`/tickets/${id}/triage`, { method: 'POST' })
    return data.data ?? data
  },
}

/* ============================================================
   HELPERS
   ============================================================ */
const $ = (sel, root = document) => root.querySelector(sel)
const app = $('#app')

function escapeHtml(str) {
  if (str == null) return ''
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;')
}

function normalizePrioridade(p) {
  if (!p) return 'MEDIA'
  const v = String(p).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  if (v === 'ALTA' || v === 'HIGH') return 'ALTA'
  if (v === 'BAIXA' || v === 'LOW') return 'BAIXA'
  return 'MEDIA'
}

function normalizeStatus(s) {
  if (!s) return 'ABERTO'
  return String(s).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '_')
}

function priorityBadge(prio, size = 'md') {
  const p = normalizePrioridade(prio)
  const label = { ALTA: 'Alta', MEDIA: 'Média', BAIXA: 'Baixa' }[p]
  const sizeClass = size === 'lg' ? ' prio-badge--lg' : ''
  return `<span class="prio-badge prio-badge--${p.toLowerCase()}${sizeClass}">
    <span class="prio-badge__dot"></span>${label}
  </span>`
}

function statusPill(status) {
  const s = normalizeStatus(status)
  const labels = { ABERTO: 'Aberto', EM_ANDAMENTO: 'Em andamento', RESOLVIDO: 'Resolvido', FECHADO: 'Fechado' }
  const key = labels[s] ? s : 'ABERTO'
  return `<span class="status-pill status-pill--${key.toLowerCase()}">${labels[key]}</span>`
}

function formatDate(iso) {
  if (!iso) return '—'
  try {
    return new Date(iso).toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    })
  } catch { return iso }
}

function field(ticket, ...keys) {
  for (const k of keys) if (ticket[k] != null && ticket[k] !== '') return ticket[k]
  return null
}

function setActiveNav(route) {
  document.querySelectorAll('.nav__link').forEach(l => {
    l.classList.toggle('is-active', l.dataset.route === route)
  })
}

/* ============================================================
   ROUTER
   ============================================================ */
function parseHash() {
  const hash = location.hash.replace(/^#/, '') || '/'
  if (hash === '/' || hash === '') return { name: 'list' }
  if (hash === '/novo') return { name: 'new' }
  const m = hash.match(/^\/tickets\/(.+)$/)
  if (m) return { name: 'detail', id: m[1] }
  return { name: 'notfound' }
}

function navigate(path, state = {}) {
  window._routeState = state
  location.hash = path
}

window.addEventListener('hashchange', render)
window.addEventListener('DOMContentLoaded', render)

async function render() {
  const route = parseHash()
  setActiveNav(
    route.name === 'list' ? '/' :
    route.name === 'new'  ? '/novo' : ''
  )
  window.scrollTo(0, 0)

  if (route.name === 'list')      await renderList()
  else if (route.name === 'new')  renderNew()
  else if (route.name === 'detail') await renderDetail(route.id)
  else renderNotFound()
}

/* ============================================================
   VIEW: LIST
   ============================================================ */
let listState = { filter: 'TODOS', search: '', tickets: [] }

async function renderList() {
  app.innerHTML = `
    <div class="view">
      <header class="page-header">
        <div>
          <span class="eyebrow">Central de triagem</span>
          <h1 class="page-title">Tickets <em>recebidos</em></h1>
          <p class="page-subtitle">
            Cada ticket é classificado automaticamente pela IA: categoria, SLA sugerido,
            impacto operacional e primeira ação recomendada.
          </p>
        </div>
        <a href="#/novo" class="btn btn--primary">+ Novo ticket</a>
      </header>

      <div class="stats-bar" id="stats-bar">
        <div class="stat"><span class="stat__label">Total</span><span class="stat__value">—</span></div>
        <div class="stat"><span class="stat__label">Em aberto</span><span class="stat__value">—</span></div>
        <div class="stat"><span class="stat__label">Prioridade alta</span><span class="stat__value">—</span></div>
      </div>

      <div class="toolbar">
        <div class="filters" id="filters">
          <button class="chip is-active" data-filter="TODOS">Todos</button>
          <button class="chip" data-filter="ALTA">Alta</button>
          <button class="chip" data-filter="MEDIA">Média</button>
          <button class="chip" data-filter="BAIXA">Baixa</button>
        </div>
        <div class="search">
          <span class="search__icon">⌕</span>
          <input id="search-input" type="text" placeholder="Buscar por título, descrição ou categoria…" />
        </div>
      </div>

      <div id="list-content">
        <div class="tickets-grid">
          ${Array.from({ length: 6 }).map(() => `
            <div class="skeleton-card">
              <div class="skeleton" style="height:16px;width:40%"></div>
              <div class="skeleton" style="height:24px;width:85%;margin-top:14px"></div>
              <div class="skeleton" style="height:12px;width:100%;margin-top:10px"></div>
              <div class="skeleton" style="height:12px;width:70%;margin-top:6px"></div>
              <div class="skeleton" style="height:40px;margin-top:20px"></div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `

  // Listeners
  $('#filters').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-filter]')
    if (!btn) return
    listState.filter = btn.dataset.filter
    document.querySelectorAll('#filters .chip').forEach(c => c.classList.remove('is-active'))
    btn.classList.add('is-active')
    renderListContent()
  })

  $('#search-input').addEventListener('input', (e) => {
    listState.search = e.target.value
    renderListContent()
  })

  // Fetch
  try {
    listState.tickets = await api.list()
    renderStats()
    renderListContent()
  } catch (e) {
    $('#list-content').innerHTML = `
      <div class="alert alert--error">
        Não foi possível carregar os tickets. Verifique se o backend Laravel está rodando em ${API_BASE}.
      </div>
    `
  }
}

function renderStats() {
  const t = listState.tickets
  const total = t.length
  const abertos = t.filter(x => normalizeStatus(x.status) === 'ABERTO').length
  const alta = t.filter(x => normalizePrioridade(field(x,'prioridade','priority')) === 'ALTA').length

  $('#stats-bar').innerHTML = `
    <div class="stat">
      <span class="stat__label">Total</span>
      <span class="stat__value">${total}</span>
    </div>
    <div class="stat">
      <span class="stat__label">Em aberto</span>
      <span class="stat__value" style="color: var(--status-aberto)">${abertos}</span>
    </div>
    <div class="stat">
      <span class="stat__label">Prioridade alta</span>
      <span class="stat__value" style="color: var(--prio-alta)">${alta}</span>
    </div>
  `
}

function renderListContent() {
  const { tickets, filter, search } = listState
  const q = search.trim().toLowerCase()

  const filtered = tickets
    .filter(t => {
      if (filter === 'TODOS') return true
      return normalizePrioridade(field(t,'prioridade','priority')) === filter
    })
    .filter(t => {
      if (!q) return true
      const hay = [
        field(t,'titulo','title'),
        field(t,'descricao','description'),
        field(t,'categoria','category'),
      ].filter(Boolean).join(' ').toLowerCase()
      return hay.includes(q)
    })

  const container = $('#list-content')

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>Nenhum ticket por aqui</h3>
        <p>${tickets.length === 0
          ? 'Crie o primeiro ticket para ver a IA em ação.'
          : 'Nenhum resultado com os filtros atuais.'}</p>
        ${tickets.length === 0
          ? `<a href="#/novo" class="btn btn--primary" style="margin-top:24px">Criar primeiro ticket</a>`
          : ''}
      </div>
    `
    return
  }

  container.innerHTML = `
    <div class="tickets-grid">
      ${filtered.map((t, i) => ticketCard(t, i)).join('')}
    </div>
  `

  container.querySelectorAll('[data-ticket-id]').forEach(el => {
    el.addEventListener('click', () => navigate('/tickets/' + el.dataset.ticketId))
  })
}

function ticketCard(t, index) {
  const titulo = field(t,'titulo','title') || 'Sem título'
  const descricao = field(t,'descricao','description') || ''
  const categoria = field(t,'categoria','category') || 'SEM_CATEGORIA'
  const sla = field(t,'sla_sugerido','sla','sla_suggested') || '—'
  const excerpt = descricao.length > 140 ? descricao.slice(0,140) + '…' : descricao

  return `
    <article class="ticket-card" data-ticket-id="${escapeHtml(t.id)}" style="animation-delay:${index*40}ms">
      <div class="ticket-card__top">
        ${priorityBadge(field(t,'prioridade','priority'))}
        <span class="ticket-card__id mono">#${String(t.id).padStart(4,'0')}</span>
      </div>
      <h3 class="ticket-card__title">${escapeHtml(titulo)}</h3>
      ${excerpt ? `<p class="ticket-card__excerpt">${escapeHtml(excerpt)}</p>` : ''}
      <div class="ticket-card__meta">
        <div class="meta-row">
          <span class="meta-label">Categoria</span>
          <span class="meta-value mono">${escapeHtml(categoria)}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">SLA</span>
          <span class="meta-value mono">${escapeHtml(sla)}</span>
        </div>
      </div>
      <div class="ticket-card__bottom">
        ${statusPill(t.status)}
        <span class="ticket-card__arrow">→</span>
      </div>
    </article>
  `
}

/* ============================================================
   VIEW: NEW TICKET
   ============================================================ */
function renderNew() {
  app.innerHTML = `
    <div class="view">
      <a href="#/" class="breadcrumb">← Tickets</a>

      <header class="page-header" style="margin-top:24px">
        <div>
          <span class="eyebrow">Novo ticket</span>
          <h1 class="page-title">Descreva o <em>problema</em></h1>
          <p class="page-subtitle">
            A IA vai classificar em categoria, sugerir SLA, analisar impacto operacional
            e gerar uma primeira ação — tudo automaticamente ao criar.
          </p>
        </div>
      </header>

      <div class="new-ticket__layout">
        <div>
          <div id="form-error-slot"></div>
          <form class="ticket-form" id="new-form" novalidate>
            <div class="field" data-field="titulo">
              <label for="titulo">
                <span class="field__label">Título</span>
                <span class="field__hint">Seja direto — a IA usa isso para classificar.</span>
              </label>
              <input id="titulo" type="text" maxlength="160"
                placeholder="Ex.: Expedição parada, pedidos não saem" autocomplete="off" />
              <div class="error-slot"></div>
            </div>

            <div class="field" data-field="descricao">
              <label for="descricao">
                <span class="field__label">Descrição</span>
                <span class="field__hint">O que aconteceu, desde quando, impacto.</span>
              </label>
              <textarea id="descricao" rows="6"
                placeholder="Detalhe o problema. Quanto mais contexto, melhor a triagem da IA."></textarea>
              <div class="field__footer">
                <span class="field__count mono" id="count">0 caracteres</span>
              </div>
            </div>

            <div class="field">
              <label for="prioridade">
                <span class="field__label">Prioridade</span>
                <span class="field__hint">Se deixar em branco, a IA sugere.</span>
              </label>
              <div class="select-wrap">
                <select id="prioridade">
                  <option value="">Deixar a IA decidir</option>
                  <option value="BAIXA">Baixa</option>
                  <option value="MEDIA">Média</option>
                  <option value="ALTA">Alta</option>
                </select>
                <span class="select-caret">▾</span>
              </div>
            </div>

            <div class="ticket-form__actions">
              <button type="submit" class="btn btn--primary" id="submit-btn">
                Criar ticket <span>→</span>
              </button>
              <p class="ticket-form__hint">
                Após criar, a IA classifica em categoria e sugere SLA automaticamente.
              </p>
            </div>
          </form>
        </div>

        <aside class="new-ticket__aside">
          <div class="info-card">
            <h4>Como funciona</h4>
            <ol>
              <li>Você envia título + descrição.</li>
              <li>O backend Laravel aciona a IA.</li>
              <li>IA retorna categoria, SLA, impacto e ação.</li>
              <li>Ticket aparece classificado na lista.</li>
            </ol>
          </div>
          <div class="info-card info-card--muted">
            <h4>Dica</h4>
            <p>
              Quanto mais contexto você der (desde quando, o que parou,
              quantas pessoas afetadas), melhor a triagem automática.
            </p>
          </div>
        </aside>
      </div>
    </div>
  `

  const form = $('#new-form')
  const titulo = $('#titulo')
  const descricao = $('#descricao')
  const prioridade = $('#prioridade')
  const count = $('#count')
  const submitBtn = $('#submit-btn')

  descricao.addEventListener('input', () => {
    count.textContent = `${descricao.value.length} caracteres`
  })

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    // Limpa erros anteriores
    document.querySelectorAll('.field').forEach(f => f.classList.remove('field--error'))
    document.querySelectorAll('.error-slot, .field__footer .field__error').forEach(el => el.innerHTML = '')

    let hasError = false
    if (!titulo.value.trim()) {
      showFieldError('titulo', 'Informe um título.'); hasError = true
    }
    if (!descricao.value.trim()) {
      showFieldError('descricao', 'Descreva o problema.'); hasError = true
    } else if (descricao.value.trim().length < 10) {
      showFieldError('descricao', 'Mínimo de 10 caracteres.'); hasError = true
    }
    if (hasError) return

    const payload = {
      titulo: titulo.value.trim(),
      descricao: descricao.value.trim(),
    }
    if (prioridade.value) payload.prioridade = prioridade.value

    submitBtn.disabled = true
    submitBtn.innerHTML = `<span class="spinner"></span> Processando com IA…`

    try {
      const ticket = await api.create(payload)
      window._routeState = { fresh: true }
      navigate('/tickets/' + ticket.id, { fresh: true })
    } catch (err) {
      const msg = err.body?.message || err.body?.error || err.message || 'Erro ao criar ticket.'
      $('#form-error-slot').innerHTML = `<div class="alert alert--error" style="margin-bottom:20px">${escapeHtml(msg)}</div>`
      submitBtn.disabled = false
      submitBtn.innerHTML = 'Criar ticket <span>→</span>'
    }
  })
}

function showFieldError(name, msg) {
  const field = document.querySelector(`[data-field="${name}"]`)
  if (!field) return
  field.classList.add('field--error')
  const slot = field.querySelector('.error-slot') || field.querySelector('.field__footer')
  if (slot) {
    slot.innerHTML = `<span class="field__error">${escapeHtml(msg)}</span>`
  }
}

/* ============================================================
   VIEW: DETAIL
   ============================================================ */
async function renderDetail(id) {
  app.innerHTML = `
    <div class="view">
      <a href="#/" class="breadcrumb">← Tickets</a>
      <div class="skeleton" style="height:14px;width:100px;margin-top:32px"></div>
      <div class="skeleton" style="height:56px;width:70%;margin-top:18px"></div>
      <div class="skeleton" style="height:200px;margin-top:40px"></div>
    </div>
  `

  let ticket
  try {
    ticket = await api.get(id)
  } catch (e) {
    app.innerHTML = `
      <div class="view">
        <a href="#/" class="breadcrumb">← Tickets</a>
        <div class="alert alert--error" style="margin-top:24px">Ticket não encontrado ou backend offline.</div>
      </div>
    `
    return
  }

  const fresh = window._routeState?.fresh
  window._routeState = null

  renderTicketDetail(ticket, fresh)
}

function renderTicketDetail(ticket, fresh) {
  const titulo = field(ticket,'titulo','title') || 'Sem título'
  const descricao = field(ticket,'descricao','description') || ''
  const categoria = field(ticket,'categoria','category') || '—'
  const sla = field(ticket,'sla_sugerido','sla') || '—'
  const impacto = field(ticket,'impacto_operacional','impacto','impact')
  const acao = field(ticket,'primeira_acao','acao_sugerida','first_action')
  const resposta = field(ticket,'resposta_usuario','resposta','user_reply')
  const prio = field(ticket,'prioridade','priority')

  app.innerHTML = `
    <div class="view">
      <a href="#/" class="breadcrumb">← Tickets</a>

      ${fresh ? `
        <div class="fresh-banner">
          <span class="fresh-banner__dot"></span>
          Ticket criado e classificado pela IA
        </div>
      ` : ''}

      <header class="detail-header">
        <div class="detail-header__top">
          <span class="ticket-id-big mono">#${String(ticket.id).padStart(4,'0')}</span>
          ${statusPill(ticket.status)}
          ${priorityBadge(prio, 'lg')}
        </div>
        <h1 class="detail-title">${escapeHtml(titulo)}</h1>
        <div class="detail-meta mono">
          <div><span>Categoria</span><strong>${escapeHtml(categoria)}</strong></div>
          <div><span>SLA sugerido</span><strong>${escapeHtml(sla)}</strong></div>
          <div><span>Criado</span><strong>${escapeHtml(formatDate(ticket.created_at))}</strong></div>
        </div>
      </header>

      <div class="detail-layout">
        <section class="detail-main">
          ${block('Descrição do problema', `<p class="prose">${escapeHtml(descricao)}</p>`, false, false, 0)}

          ${impacto ? block('Impacto operacional',
              `<p class="prose">${escapeHtml(impacto)}</p>`, true, false, 1) : ''}

          ${acao ? block('Primeira ação sugerida',
              `<p class="prose">${escapeHtml(acao)}</p>`, true, false, 2) : ''}

          ${resposta ? block('Resposta para o usuário', `
            <blockquote class="reply">${escapeHtml(resposta)}</blockquote>
            <button class="btn btn--ghost btn--sm" id="copy-reply" style="margin-top:14px" type="button">
              Copiar resposta
            </button>
          `, true, true, 3) : ''}
        </section>

        <aside class="detail-aside">
          <div class="ai-card">
            <div class="ai-card__header">
              <span class="ai-badge"><span class="ai-badge__dot"></span>IA</span>
              <h3>Triagem automática</h3>
            </div>
            <p class="ai-card__text">
              Este ticket foi classificado usando IA. Se o contexto mudou,
              reanalise para atualizar categoria, SLA e sugestões.
            </p>
            <button class="btn btn--ai" id="retriage-btn" type="button">⟳ Reanalisar com IA</button>
          </div>

          <div class="info-card">
            <h4>Metadados</h4>
            <dl class="kv">
              <dt>ID</dt><dd class="mono">${escapeHtml(ticket.id)}</dd>
              <dt>Status</dt><dd>${escapeHtml(ticket.status || 'ABERTO')}</dd>
              <dt>Prioridade</dt><dd>${escapeHtml(prio || '—')}</dd>
              <dt>Categoria</dt><dd class="mono">${escapeHtml(categoria)}</dd>
              <dt>SLA</dt><dd class="mono">${escapeHtml(sla)}</dd>
              ${ticket.updated_at
                ? `<dt>Atualizado</dt><dd class="mono">${escapeHtml(formatDate(ticket.updated_at))}</dd>`
                : ''}
            </dl>
          </div>
        </aside>
      </div>
    </div>
  `

  // Copiar resposta
  const copyBtn = $('#copy-reply')
  if (copyBtn && resposta) {
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(resposta)
        const original = copyBtn.textContent
        copyBtn.textContent = 'Copiado!'
        setTimeout(() => copyBtn.textContent = original, 1500)
      } catch {}
    })
  }

  // Reanalisar
  $('#retriage-btn').addEventListener('click', async () => {
    const btn = $('#retriage-btn')
    btn.disabled = true
    btn.innerHTML = `<span class="spinner"></span> Reanalisando…`
    try {
      const updated = await api.triage(ticket.id)
      renderTicketDetail(updated, false)
    } catch (e) {
      alert('Falha ao reanalisar com IA. Tente novamente.')
      btn.disabled = false
      btn.innerHTML = '⟳ Reanalisar com IA'
    }
  })
}

function block(label, body, ai = false, highlight = false, index = 0) {
  return `
    <div class="block${highlight ? ' block--highlight' : ''}" style="animation-delay:${index*80}ms">
      <div class="block__label">
        ${ai ? '<span class="ai-tag">IA</span>' : ''}
        <span>${escapeHtml(label)}</span>
      </div>
      <div class="block__body">${body}</div>
    </div>
  `
}

/* ============================================================
   VIEW: NOT FOUND
   ============================================================ */
function renderNotFound() {
  app.innerHTML = `
    <div class="view" style="padding:80px 0;text-align:center">
      <h1 style="font-family:var(--font-display);font-size:64px">404</h1>
      <p style="color:var(--text-2)">Rota não encontrada.</p>
      <a href="#/" class="btn btn--ghost" style="margin-top:20px;display:inline-block">← Voltar ao início</a>
    </div>
  `
}
</script>
